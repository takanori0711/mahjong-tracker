<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>🀄 麻雀スコア</title>
<style>
:root {
  --green:      #1b5e20;
  --green-mid:  #2e7d32;
  --green-light:#43a047;
  --green-pale: #e8f5e9;
  --green-bg:   #f1f8e9;
  --red:        #c62828;
  --red-pale:   #ffebee;
  --gold:       #f9a825;
  --silver:     #90a4ae;
  --bronze:     #a1887f;
  --bg:         #f4f6f4;
  --card:       #ffffff;
  --text:       #1a2e1a;
  --sub:        #6a7a6a;
  --border:     #dde8dd;
  --safe-bot:   env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* ── Header ── */
.hdr{background:var(--green);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:18px;font-weight:700;letter-spacing:.5px}
.hdr-sub{font-size:11px;opacity:.75;margin-top:2px}
.hdr-actions{display:flex;gap:8px}
.hdr-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-weight:600}

/* ── Bottom Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;z-index:60;padding-bottom:var(--safe-bot)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;cursor:pointer;color:var(--sub);background:none;border:none;font-size:10px;font-weight:500;transition:color .15s}
.nav-btn svg{width:22px;height:22px;margin-bottom:3px}
.nav-btn.active{color:var(--green-mid)}

/* ── Pages ── */
.page{display:none;padding:12px 12px 80px}
.page.active{display:block}

/* ── Section label ── */
.sec{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.8px;text-transform:uppercase;margin:16px 0 8px 4px}
.sec:first-child{margin-top:4px}

/* ── Card ── */
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}

/* ── Ranking ── */
.rank-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-right:12px}
.rb1{background:var(--gold);color:#5d4037}
.rb2{background:var(--silver);color:#37474f}
.rb3{background:var(--bronze);color:#fff}
.rb-{background:#eceff1;color:#90a4ae}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:16px;font-weight:700}
.rank-detail{font-size:11px;color:var(--sub);margin-top:2px}
.rank-score{font-size:22px;font-weight:800;white-space:nowrap;padding-left:8px}
.pos{color:var(--green-mid)}.neg{color:var(--red)}.zer{color:var(--sub)}

/* ── Sparkline ── */
.spark{height:36px;display:flex;align-items:center;margin-top:6px;gap:2px}
.spark-bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;max-height:36px}

/* ── Game Card ── */
.g-card{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.g-head{padding:9px 14px;background:var(--green-pale);display:flex;justify-content:space-between;align-items:center}
.g-date{font-size:13px;font-weight:700;color:var(--green)}
.g-memo{font-size:11px;color:var(--sub);max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.g-players{display:grid;gap:1px;background:var(--border)}
.g-player{background:var(--card);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.g-pname{font-size:14px;font-weight:600}
.g-rank-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px}
.br1{background:#fff8e1;color:#f57f17}.br2{background:#f5f5f5;color:#616161}
.br3{background:#fbe9e7;color:#bf360c}.br4{background:#ede7f6;color:#4527a0}
.g-pscore{font-size:17px;font-weight:800}
.g-del{background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
.g-del:active{color:var(--red)}

/* ── Form ── */
.f-group{margin-bottom:14px}
.f-label{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px;display:block;letter-spacing:.3px}
.f-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;font-size:16px;background:#fff;-webkit-appearance:none;appearance:none;color:var(--text)}
.f-input:focus{outline:none;border-color:var(--green-light)}
.f-row{display:grid;grid-template-columns:1fr 110px;gap:8px;margin-bottom:8px;align-items:center}

/* ── Button ── */
.btn{display:block;width:100%;padding:14px;background:var(--green-mid);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;letter-spacing:.3px}
.btn:active{opacity:.85}
.btn-sm{display:inline-block;padding:10px 18px;width:auto;font-size:14px;border-radius:10px}
.btn-ghost{background:transparent;color:var(--green-mid);border:1.5px solid var(--green-mid)}
.btn-danger{background:var(--red-pale);color:var(--red)}
.btn-gray{background:#f0f0f0;color:var(--sub)}

/* ── Player list ── */
.p-item{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.p-item:last-child{border-bottom:none}
.p-name{font-size:16px;font-weight:700}
.p-sub{font-size:11px;color:var(--sub);margin-top:2px}
.p-score-big{font-size:20px;font-weight:800}

/* ── Player detail modal ── */
.modal-over{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}
.modal-over.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-height:85vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bot))}
.modal-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:16px}
.modal-close{position:absolute;top:14px;right:16px;font-size:24px;background:none;border:none;color:var(--sub);cursor:pointer}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--green-pale);border-radius:10px;padding:11px;text-align:center}
.stat-v{font-size:20px;font-weight:800}
.stat-l{font-size:10px;color:var(--sub);margin-top:3px}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(72px + var(--safe-bot) + 8px);left:50%;transform:translateX(-50%);background:rgba(20,50,20,.88);color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;z-index:300;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* ── Empty state ── */
.empty{text-align:center;padding:36px 20px;color:var(--sub)}
.empty-ico{font-size:44px;margin-bottom:10px}

/* ── Segment ── */
.seg{display:flex;background:#e8f0e8;border-radius:10px;padding:3px;margin-bottom:14px}
.seg-btn{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
.seg-btn.on{background:#fff;color:var(--green);box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* ── Import/Export modal ── */
.io-row{display:flex;gap:10px;margin-bottom:12px}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">🀄 麻雀スコア</div>
    <div class="hdr-sub" id="hdrSub">成績管理アプリ</div>
  </div>
  <div class="hdr-actions">
    <button class="hdr-btn" onclick="openIO()">📤 共有</button>
  </div>
</header>

<!-- ── HOME ── -->
<div id="pg-home" class="page active">
  <div class="sec">総合ランキング</div>
  <div class="card" id="rankList"><div class="empty"><div class="empty-ico">🀄</div><p>まだデータがありません</p></div></div>

  <div class="sec">最近の対局</div>
  <div id="recentList"><div class="empty"><div class="empty-ico">📋</div><p>対局履歴がありません</p></div></div>
</div>

<!-- ── ADD ── -->
<div id="pg-add" class="page">
  <div class="card">
    <div class="f-group">
      <label class="f-label">対局日</label>
      <input type="date" id="g-date" class="f-input">
    </div>

    <div class="f-group">
      <label class="f-label">人数</label>
      <div class="seg" id="playerCountSeg">
        <button class="seg-btn" onclick="setPlayerCount(3,this)">三麻（3人）</button>
        <button class="seg-btn on" onclick="setPlayerCount(4,this)">四麻（4人）</button>
      </div>
    </div>

    <label class="f-label">プレイヤー &amp; スコア</label>
    <div id="scoreRows"></div>

    <div class="f-group" style="margin-top:10px">
      <label class="f-label">メモ（任意）</label>
      <input type="text" id="g-memo" class="f-input" placeholder="例：〇〇荘にて、東風戦など">
    </div>
    <button class="btn" onclick="saveGame()">💾 記録する</button>
  </div>
</div>

<!-- ── HISTORY ── -->
<div id="pg-hist" class="page">
  <div id="histList"><div class="empty"><div class="empty-ico">📋</div><p>対局履歴がありません</p></div></div>
</div>

<!-- ── MEMBERS ── -->
<div id="pg-mem" class="page">
  <div class="card">
    <label class="f-label">新しいメンバーを追加</label>
    <div style="display:flex;gap:8px">
      <input type="text" id="newName" class="f-input" placeholder="名前（例：たか）" style="flex:1">
      <button class="btn btn-sm" onclick="addPlayer()" style="white-space:nowrap">追加</button>
    </div>
  </div>
  <div class="card" id="memberList"><div class="empty"><div class="empty-ico">👤</div><p>メンバーが登録されていません</p></div></div>
</div>

<!-- ── Bottom Nav ── -->
<nav class="nav">
  <button class="nav-btn active" onclick="goPage('home',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>ホーム
  </button>
  <button class="nav-btn" onclick="goPage('add',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>記録
  </button>
  <button class="nav-btn" onclick="goPage('hist',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>履歴
  </button>
  <button class="nav-btn" onclick="goPage('mem',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>メンバー
  </button>
</nav>

<!-- ── Player Detail Modal ── -->
<div class="modal-over" id="pdModal" onclick="closePD(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closePDBtn()">×</button>
    <div class="modal-title" id="pdName"></div>
    <div class="stats-grid" id="pdStats"></div>
    <div class="sec" style="margin-top:0">スコア推移</div>
    <canvas id="pdChart" height="100" style="width:100%;display:block;margin-bottom:14px"></canvas>
    <div class="sec">対局履歴</div>
    <div id="pdHist"></div>
  </div>
</div>

<!-- ── IO Modal ── -->
<div class="modal-over" id="ioModal" onclick="closeIO(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeIOBtn()">×</button>
    <div class="modal-title">データ共有</div>
    <div class="io-row">
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="exportJSON()">📥 JSONエクスポート</button>
      <button class="btn btn-ghost btn-sm" style="flex:1" onclick="document.getElementById('importFile').click()">📤 JSONインポート</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)">
    <p style="font-size:12px;color:var(--sub);text-align:center;line-height:1.6">
      エクスポートしたJSONファイルを友達に送り、<br>インポートで成績を共有できます。
    </p>
    <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
      <button class="btn btn-danger" onclick="confirmReset()">🗑 全データをリセット</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =========================================
// Storage
// =========================================
const SK = { p:'mj_players', g:'mj_games' };
const load = k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } };
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));

let players = load(SK.p);
let games   = load(SK.g);

// =========================================
// Navigation
// =========================================
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pg-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'add')  renderAddPage();
  if (name === 'hist') renderHist();
  if (name === 'mem')  renderMembers();
}

// =========================================
// Toast
// =========================================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// =========================================
// Stats
// =========================================
function allStats() {
  const m = {};
  players.forEach(p => { m[p.id] = { id:p.id, name:p.name, total:0, games:0, wins:0, r1:0,r2:0,r3:0,r4:0, hist:[] }; });
  games.forEach(g => {
    g.players.forEach(gp => {
      if (!m[gp.id]) return;
      m[gp.id].total += gp.score;
      m[gp.id].games++;
      m[gp.id].hist.push({ date:g.date, score:gp.score, rank:gp.rank });
      if (gp.rank===1) { m[gp.id].wins++; m[gp.id].r1++; }
      if (gp.rank===2) m[gp.id].r2++;
      if (gp.rank===3) m[gp.id].r3++;
      if (gp.rank===4) m[gp.id].r4++;
    });
  });
  return Object.values(m).filter(s=>s.games>0).sort((a,b)=>b.total-a.total);
}

// =========================================
// HOME
// =========================================
function renderHome() {
  const stats = allStats();
  document.getElementById('hdrSub').textContent =
    `${players.length}人 / ${games.length}戦記録中`;

  // Ranking
  const rl = document.getElementById('rankList');
  if (!stats.length) {
    rl.innerHTML = '<div class="empty"><div class="empty-ico">🀄</div><p>まだデータがありません<br><small style="font-size:11px">メンバーを追加して対局を記録してください</small></p></div>';
  } else {
    rl.innerHTML = stats.map((s,i) => {
      const bc = ['rb1','rb2','rb3','rb-'][Math.min(i,3)];
      const sc = s.total>0?'pos':s.total<0?'neg':'zer';
      const sign = s.total>0?'+':'';
      const wr = s.games>0?Math.round(s.wins/s.games*100):0;
      const avg = s.games>0?Math.round(s.total/s.games):0;
      const avgSign = avg>=0?'+':'';
      // sparkline data
      const sparkData = s.hist.slice(-12).map(h=>h.score);
      const sparkHTML = sparkline(sparkData);
      return `<div class="rank-row" onclick="openPD('${s.id}')">
        <div class="rank-badge ${bc}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${esc(s.name)}</div>
          <div class="rank-detail">${s.games}戦 ｜ 1位率${wr}% ｜ 平均${avgSign}${avg.toLocaleString()}</div>
          <div class="spark">${sparkHTML}</div>
        </div>
        <div class="rank-score ${sc}">${sign}${s.total.toLocaleString()}</div>
      </div>`;
    }).join('');
  }

  // Recent
  const sorted = [...games].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  const rl2 = document.getElementById('recentList');
  rl2.innerHTML = sorted.length ? sorted.map(g=>gameCard(g,false)).join('') :
    '<div class="empty"><div class="empty-ico">📋</div><p>対局履歴がありません</p></div>';
}

function sparkline(data) {
  if (!data.length) return '';
  const max = Math.max(...data.map(Math.abs), 1);
  return data.map(v => {
    const h = Math.max(3, Math.round(Math.abs(v)/max*34));
    const c = v>0?'#43a047':v<0?'#e53935':'#90a4ae';
    return `<div class="spark-bar" style="height:${h}px;background:${c}"></div>`;
  }).join('');
}

// =========================================
// GAME CARD
// =========================================
function gameCard(g, showDel=true) {
  const sorted = [...g.players].sort((a,b)=>b.score-a.score);
  const bc = ['br1','br2','br3','br4'];
  const cols = sorted.length <= 3 ? `repeat(${sorted.length},1fr)` : '1fr 1fr';
  const delBtn = showDel ? `<button class="g-del" onclick="event.stopPropagation();delGame('${g.id}')">✕</button>` : '';
  return `<div class="g-card">
    <div class="g-head" onclick="this.parentElement.querySelector('.g-players').style.display==='none'?this.parentElement.querySelector('.g-players').style.display='grid':this.parentElement.querySelector('.g-players').style.display='none'">
      <span class="g-date">📅 ${fmtDate(g.date)}</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${g.memo?`<span class="g-memo">${esc(g.memo)}</span>`:''}
        ${delBtn}
      </div>
    </div>
    <div class="g-players" style="grid-template-columns:${cols}">
      ${sorted.map((p,i)=>{
        const sc = p.score>0?'pos':p.score<0?'neg':'zer';
        const sign = p.score>0?'+':'';
        return `<div class="g-player">
          <div>
            <span class="g-pname">${esc(p.name)}</span>
            <span class="g-rank-badge ${bc[i]}">${i+1}位</span>
          </div>
          <div class="g-pscore ${sc}">${sign}${p.score}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// =========================================
// ADD PAGE
// =========================================
let pCount = 4;
function setPlayerCount(n, el) {
  pCount = n;
  document.querySelectorAll('#playerCountSeg .seg-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderScoreRows();
}

function renderAddPage() {
  if (!document.getElementById('g-date').value)
    document.getElementById('g-date').value = todayStr();
  renderScoreRows();
}

function renderScoreRows() {
  const opts = players.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  let html = '';
  if (!players.length) {
    html = '<div style="text-align:center;color:var(--sub);padding:16px;font-size:14px">先にメンバーを登録してください</div>';
  } else {
    for (let i=0;i<pCount;i++) {
      html += `<div class="f-row">
        <select class="f-input" id="pp-${i}">
          <option value="">プレイヤー選択</option>${opts}
        </select>
        <input type="number" class="f-input" id="ps-${i}" placeholder="スコア" inputmode="numeric" style="text-align:center">
      </div>`;
    }
  }
  document.getElementById('scoreRows').innerHTML = html;
}

function saveGame() {
  const date = document.getElementById('g-date').value;
  if (!date) { toast('対局日を選択してください'); return; }
  const memo = document.getElementById('g-memo').value.trim();
  const gps = [];
  const usedIds = new Set();

  for (let i=0;i<pCount;i++) {
    const pid = document.getElementById(`pp-${i}`)?.value;
    const sv  = document.getElementById(`ps-${i}`)?.value;
    if (!pid && !sv) continue;
    if (!pid) { toast(`${i+1}人目のプレイヤーを選択してください`); return; }
    if (sv===''||sv===undefined) { toast(`${i+1}人目のスコアを入力してください`); return; }
    if (usedIds.has(pid)) { toast('同じプレイヤーが重複しています'); return; }
    usedIds.add(pid);
    const pl = players.find(p=>p.id===pid);
    gps.push({ id:pid, name:pl.name, score:parseInt(sv,10) });
  }
  if (gps.length < 2) { toast('最低2人分のスコアを入力してください'); return; }

  // Assign ranks (descending score = rank 1)
  [...gps].sort((a,b)=>b.score-a.score).forEach((p,i)=>{ p.rank=i+1; });

  games.push({ id: Date.now().toString(), date, memo, players: gps, createdAt: new Date().toISOString() });
  save(SK.g, games);
  toast('✅ 対局を記録しました！');
  document.getElementById('g-memo').value = '';
  renderScoreRows();
  setTimeout(()=>{ const btn=document.querySelector('.nav-btn'); goPage('home',btn); }, 700);
}

// =========================================
// HISTORY
// =========================================
function renderHist() {
  const sorted = [...games].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('histList').innerHTML = sorted.length
    ? sorted.map(g=>gameCard(g,true)).join('')
    : '<div class="empty"><div class="empty-ico">📋</div><p>対局履歴がありません</p></div>';
}

function delGame(id) {
  if (!confirm('この対局を削除しますか？')) return;
  games = games.filter(g=>g.id!==id);
  save(SK.g, games);
  renderHist();
  toast('削除しました');
}

// =========================================
// MEMBERS
// =========================================
function addPlayer() {
  const n = document.getElementById('newName').value.trim();
  if (!n) { toast('名前を入力してください'); return; }
  if (players.find(p=>p.name===n)) { toast('同じ名前のメンバーがいます'); return; }
  players.push({ id: Date.now().toString(), name:n, createdAt: new Date().toISOString() });
  save(SK.p, players);
  document.getElementById('newName').value = '';
  renderMembers();
  toast(`${n} を追加しました`);
}

function renderMembers() {
  const el = document.getElementById('memberList');
  if (!players.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">👤</div><p>メンバーが登録されていません</p></div>';
    return;
  }
  const sm = {};
  allStats().forEach(s=>sm[s.id]=s);
  el.innerHTML = players.map(p => {
    const s = sm[p.id];
    const total = s ? (s.total>=0?'+':'')+s.total.toLocaleString() : '---';
    const sc = s&&s.total>0?'pos':s&&s.total<0?'neg':'zer';
    return `<div class="p-item" onclick="openPD('${p.id}')">
      <div>
        <div class="p-name">${esc(p.name)}</div>
        <div class="p-sub">${s?s.games+'戦':'未記録'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="p-score-big ${sc}">${total}</div>
        <button class="btn btn-danger btn-sm" style="padding:6px 10px;font-size:12px" onclick="event.stopPropagation();delPlayer('${p.id}')">削除</button>
      </div>
    </div>`;
  }).join('');
}

function delPlayer(id) {
  const pl = players.find(p=>p.id===id);
  if (!confirm(`${pl.name} を削除しますか？\n（対局記録は残ります）`)) return;
  players = players.filter(p=>p.id!==id);
  save(SK.p, players);
  renderMembers();
  toast('削除しました');
}

// =========================================
// PLAYER DETAIL MODAL
// =========================================
function openPD(pid) {
  const s = allStats().find(x=>x.id===pid);
  if (!s) { toast('成績データがありません'); return; }
  document.getElementById('pdName').textContent = s.name;

  const wr = s.games>0?Math.round(s.wins/s.games*100):0;
  const avg = s.games>0?Math.round(s.total/s.games):0;
  const avgSign = avg>=0?'+':'';
  const rankAvg = s.games>0
    ? ((s.r1*1+s.r2*2+s.r3*3+s.r4*4)/s.games).toFixed(1) : '-';

  document.getElementById('pdStats').innerHTML = [
    [s.games+'戦','出場数'],
    [(s.total>=0?'+':'')+s.total.toLocaleString(),'累計'],
    [wr+'%','1位率'],
    [avgSign+avg.toLocaleString(),'平均'],
    [rankAvg,'平均順位'],
    [s.r1+'回','1位回数'],
  ].map(([v,l])=>`<div class="stat-box"><div class="stat-v">${v}</div><div class="stat-l">${l}</div></div>`).join('');

  // Chart
  drawChart(s.hist);

  // History
  const hist = [...s.hist].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('pdHist').innerHTML = hist.map(h=>{
    const sc = h.score>0?'pos':h.score<0?'neg':'zer';
    const sign = h.score>0?'+':'';
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:13px;color:var(--sub)">${fmtDate(h.date)}</div>
        <div style="font-size:11px;color:var(--sub)">${h.rank}位</div>
      </div>
      <div class="rank-score ${sc}" style="font-size:18px">${sign}${h.score.toLocaleString()}</div>
    </div>`;
  }).join('');

  document.getElementById('pdModal').classList.add('open');
}

function drawChart(hist) {
  const cvs = document.getElementById('pdChart');
  const ctx = cvs.getContext('2d');
  cvs.width = cvs.offsetWidth * devicePixelRatio;
  cvs.height = 100 * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = cvs.offsetWidth, H = 100;
  ctx.clearRect(0,0,W,H);

  if (!hist.length) return;
  const sorted = [...hist].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const cums = [];
  let run = 0;
  sorted.forEach(h=>{ run+=h.score; cums.push(run); });

  const maxV = Math.max(Math.abs(Math.max(...cums)), Math.abs(Math.min(...cums)), 1);
  const pad = 10;
  const pts = cums.map((v,i)=>({
    x: pad + (i/(cums.length-1||1))*(W-pad*2),
    y: (H/2) - (v/maxV)*(H/2-pad)
  }));

  // Zero line
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.setLineDash([]);

  // Area fill
  const lastY = pts[pts.length-1].y;
  const final = cums[cums.length-1];
  const grad = ctx.createLinearGradient(0,0,0,H);
  if (final>=0) { grad.addColorStop(0,'rgba(67,160,71,.3)'); grad.addColorStop(1,'rgba(67,160,71,.0)'); }
  else { grad.addColorStop(0,'rgba(229,57,53,.0)'); grad.addColorStop(1,'rgba(229,57,53,.3)'); }
  ctx.beginPath();
  ctx.moveTo(pts[0].x, H/2);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, H/2);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.strokeStyle = final>=0?'#43a047':'#e53935';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.stroke();

  // Dots
  pts.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle = final>=0?'#43a047':'#e53935'; ctx.fill();
  });
}

function closePD(e) { if (e.target===document.getElementById('pdModal')) closePDBtn(); }
function closePDBtn() { document.getElementById('pdModal').classList.remove('open'); }

// =========================================
// IMPORT / EXPORT
// =========================================
function openIO() { document.getElementById('ioModal').classList.add('open'); }
function closeIO(e) { if (e.target===document.getElementById('ioModal')) closeIOBtn(); }
function closeIOBtn() { document.getElementById('ioModal').classList.remove('open'); }

function exportJSON() {
  const data = { players, games, exportedAt: new Date().toISOString(), version: 1 };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mahjong_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('エクスポートしました');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.players || !data.games) throw new Error('形式が不正です');
      if (!confirm(`インポートしますか？\nプレイヤー: ${data.players.length}人\n対局: ${data.games.length}戦\n※現在のデータに追加されます`)) return;
      // Merge (avoid duplicates by id)
      const pIds = new Set(players.map(p=>p.id));
      const gIds = new Set(games.map(g=>g.id));
      data.players.forEach(p=>{ if (!pIds.has(p.id)) players.push(p); });
      data.games.forEach(g=>{ if (!gIds.has(g.id)) games.push(g); });
      save(SK.p, players); save(SK.g, games);
      toast('インポートしました！');
      closeIOBtn();
      renderHome();
    } catch(err) { toast('インポートに失敗しました: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

function confirmReset() {
  if (!confirm('全データを削除します。元に戻せません。\n本当によいですか？')) return;
  players = []; games = [];
  save(SK.p, players); save(SK.g, games);
  toast('リセットしました');
  closeIOBtn();
  renderHome();
}

// =========================================
// Utilities
// =========================================
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`;
}

// =========================================
// Init
// =========================================
renderHome();
</script>

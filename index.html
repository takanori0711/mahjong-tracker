<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#B71C1C">
  <title>🀄 麻雀成績帳</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --red:#C62828;--red-d:#8E0000;--red-l:#FFEBEE;
      --blue:#1565C0;--blue-l:#E3F2FD;
      --amber:#E65100;--amber-l:#FFF3E0;
      --green:#2E7D32;--green-l:#E8F5E9;
      --bg:#F4F4F4;--surface:#FFFFFF;
      --text:#1A1A1A;--text2:#757575;--border:#E0E0E0;
      --nav:64px;--top:52px;--r:12px;
    }
    html,body{height:100%;font-family:-apple-system,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
    #app{max-width:540px;margin:0 auto;min-height:100%;background:var(--bg);position:relative;}

    /* TOPBAR */
    .top{position:sticky;top:0;z-index:100;background:var(--red);color:#fff;height:var(--top);display:flex;align-items:center;padding:0 16px;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.25);}
    .top-title{font-size:17px;font-weight:700;flex:1;}
    .top-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px;border-radius:8px;line-height:1;}
    .top-btn:active{background:rgba(255,255,255,.2);}

    /* BOTTOM NAV */
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;height:var(--nav);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 6px rgba(0,0,0,.08);}
    .nv{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--text2);font-size:11px;padding-bottom:env(safe-area-inset-bottom,0);-webkit-tap-highlight-color:transparent;transition:color .15s;}
    .nv.on{color:var(--red);}
    .nv svg{width:22px;height:22px;}

    /* MAIN */
    .main{padding:14px;padding-bottom:calc(var(--nav) + 16px);}
    .page{display:none;}.page.on{display:block;}

    /* CARD */
    .card{background:var(--surface);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
    .card-t{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}

    /* LEADER */
    .li{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
    .li:last-child{border-bottom:none;}
    .li-rank{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:var(--bg);color:var(--text2);}
    .r1{background:#FFD700;color:#333;}.r2{background:#C0C0C0;color:#333;}.r3{background:#CD7F32;color:#fff;}
    .li-name{flex:1;font-size:15px;font-weight:700;}
    .li-sub{font-size:11px;color:var(--text2);margin-top:1px;}
    .li-score{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;}
    .pos{color:var(--green);}.neg{color:var(--red);}

    /* STAT BAR */
    .bar-row{margin-bottom:9px;}
    .bar-hd{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
    .bar-bg{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
    .bt{background:var(--blue);}.ba{background:var(--amber);}.br{background:var(--red);}

    /* MINI STAT */
    .msg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
    .ms{background:var(--bg);border-radius:8px;padding:9px;text-align:center;}
    .ms-v{font-size:20px;font-weight:800;}
    .ms-l{font-size:10px;color:var(--text2);margin-top:2px;}

    /* HISTORY */
    .si{background:var(--surface);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
    .si-hd{display:flex;align-items:center;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
    .si-date{font-size:14px;font-weight:700;flex:1;}
    .si-meta{font-size:11px;color:var(--text2);margin-right:8px;}
    .si-ch{color:var(--text2);font-size:18px;transition:transform .2s;line-height:1;}
    .si-ch.open{transform:rotate(90deg);}
    .si-bd{display:none;padding:0 14px 12px;}
    .si-bd.open{display:block;}
    .si-row{display:flex;align-items:center;padding:6px 0;border-top:1px solid var(--border);font-size:13px;gap:6px;}
    .si-nm{width:55px;font-weight:700;}
    .si-sc{width:65px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;}
    .si-dt{flex:1;font-size:11px;color:var(--text2);text-align:right;}
    .del-btn{border:none;background:var(--red-l);color:var(--red);font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;margin-top:8px;width:100%;}

    /* FORM */
    .fg{margin-bottom:14px;}
    .fl{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
    .fi{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;color:var(--text);-webkit-appearance:none;transition:border-color .15s;}
    .fi:focus{outline:none;border-color:var(--red);}
    .pe{background:var(--bg);border-radius:10px;padding:12px;margin-bottom:10px;}
    .pe-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .pe-nm{font-size:16px;font-weight:700;}
    .pe-rm{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0;line-height:1;}
    .eg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
    .ef{display:flex;flex-direction:column;gap:3px;}
    .ef label{font-size:10px;color:var(--text2);font-weight:700;text-align:center;}
    .ef input{text-align:center;padding:8px 2px;border:1.5px solid var(--border);border-radius:8px;font-size:16px;font-family:inherit;background:#fff;-webkit-appearance:none;width:100%;}
    .ef input:focus{outline:none;border-color:var(--red);}
    .add-p-btn{width:100%;padding:12px;border:2px dashed var(--border);border-radius:10px;background:none;color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-tap-highlight-color:transparent;}
    .add-p-btn:active{border-color:var(--red);color:var(--red);}
    .pri-btn{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;}
    .pri-btn:active{background:var(--red-d);}
    .sec-btn{width:100%;padding:11px;background:none;border:1.5px solid var(--border);border-radius:10px;font-size:15px;cursor:pointer;color:var(--text);margin-bottom:8px;font-family:inherit;}
    .sec-btn:active{background:var(--bg);}

    /* SHEET */
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
    .overlay.open{display:flex;}
    .sheet{width:100%;max-width:540px;background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;max-height:70vh;overflow-y:auto;}
    .sheet-t{font-size:16px;font-weight:700;margin-bottom:14px;text-align:center;}
    .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
    .chip{padding:7px 15px;background:var(--bg);border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:14px;-webkit-tap-highlight-color:transparent;font-family:inherit;}
    .chip.on{background:var(--red);border-color:var(--red);color:#fff;}
    .new-p-row{display:flex;gap:8px;margin-top:8px;}
    .new-p-in{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;}
    .new-p-in:focus{outline:none;border-color:var(--red);}
    .new-p-add{padding:9px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;white-space:nowrap;}
    .sheet-ok{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-top:14px;}

    /* PLAYER TABS */
    .ptabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .ptabs::-webkit-scrollbar{display:none;}
    .ptab{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:none;font-size:14px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
    .ptab.on{background:var(--red);border-color:var(--red);color:#fff;}

    /* SETTINGS */
    .set-sec{margin-bottom:20px;}
    .set-t{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:10px;}
    .pm-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
    .pm-nm{flex:1;font-size:15px;}
    .danger-btn{background:var(--red-l);color:var(--red);border:none;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}

    /* MISC */
    .empty{text-align:center;padding:48px 16px;color:var(--text2);}
    .empty-ico{font-size:48px;margin-bottom:10px;}
    .empty-t{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .sec-t{font-size:16px;font-weight:700;margin-bottom:10px;}
    .sep{height:1px;background:var(--border);margin:6px 0;}

    @media(prefers-color-scheme:dark){
      :root{--bg:#111;--surface:#1C1C1E;--text:#F0F0F0;--text2:#888;--border:#2C2C2E;}
      .fi,.ef input,.new-p-in{background:#2A2A2A;color:#F0F0F0;}
      .pe{background:#252525;}.ms{background:#252525;}
      .chip{background:#2A2A2A;}.sheet{background:#1C1C1E;}
      .new-p-add,.sheet-ok,.pri-btn{background:var(--red);}
    }
  </style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div class="top">
    <div class="top-title" id="top-title">🀄 麻雀成績帳</div>
    <button class="top-btn" id="top-action" onclick="topAction()" style="display:none">＋</button>
  </div>

  <!-- PAGES -->
  <div class="main">
    <!-- HOME -->
    <div class="page on" id="page-home">
      <div id="home-content"></div>
    </div>

    <!-- ADD -->
    <div class="page" id="page-add">
      <div id="add-content"></div>
    </div>

    <!-- HISTORY -->
    <div class="page" id="page-history">
      <div id="hist-content"></div>
    </div>

    <!-- STATS -->
    <div class="page" id="page-stats">
      <div id="stats-content"></div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="page-settings">
      <div id="set-content"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button class="nv on" data-p="home" onclick="go('home')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      ホーム
    </button>
    <button class="nv" data-p="add" onclick="go('add')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      記録
    </button>
    <button class="nv" data-p="history" onclick="go('history')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.95-2.05L6.64 18.36A8.965 8.965 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      履歴
    </button>
    <button class="nv" data-p="stats" onclick="go('stats')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9.2h3V19H5V9.2zM10.6 5h2.8v14h-2.8V5zM16.2 13h2.8v6h-2.8v-6z"/></svg>
      統計
    </button>
    <button class="nv" data-p="settings" onclick="go('settings')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      設定
    </button>
  </div>

  <!-- PLAYER SELECT SHEET -->
  <div class="overlay" id="player-sheet">
    <div class="sheet">
      <div class="sheet-t">プレイヤーを選択</div>
      <div class="chips" id="sheet-chips"></div>
      <div class="new-p-row">
        <input class="new-p-in" id="new-p-in" placeholder="新しいプレイヤー名" maxlength="8">
        <button class="new-p-add" onclick="addNewPlayer()">追加</button>
      </div>
      <button class="sheet-ok" onclick="confirmPlayers()">決定</button>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const KEY = 'mj_v3';
const TODAY = new Date().toISOString().split('T')[0];

function loadData() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) return JSON.parse(r);
  } catch(e){}
  return initData();
}

function initData() {
  // Seed with parsed historical records
  const players = ['はず','たか','まー','むつ','はるき','ひろ','ゆうせい','睦月'];
  const raw = [
    {id:'s1', date:'', results:[{p:'はず',t:-286},{p:'たか',t:215},{p:'まー',t:71}]},
    {id:'s2', date:'', results:[{p:'はず',t:-218},{p:'まー',t:93},{p:'たか',t:125}]},
    {id:'s3', date:'', results:[{p:'はず',t:83},{p:'まー',t:-193},{p:'たか',t:110}]},
    {id:'s4a',date:'', results:[{p:'たか',t:141},{p:'はず',t:-44},{p:'むつ',t:-97}]},
    {id:'s4b',date:'', results:[{p:'たか',t:186},{p:'はず',t:-25},{p:'むつ',t:-161}]},
    {id:'s5', date:'', results:[{p:'はるき',t:-125},{p:'まー',t:-8},{p:'はず',t:-11},{p:'たか',t:144}]},
    {id:'s6', date:'', results:[{p:'はず',t:-40},{p:'まー',t:-62},{p:'たか',t:102}]},
    {id:'s7a',date:'', results:[{p:'はず',t:128},{p:'ひろ',t:-127},{p:'たか',t:-1}]},
    {id:'s7b',date:'', results:[{p:'まー',t:-20},{p:'たか',t:0},{p:'ひろ',t:-55},{p:'はず',t:75}]},
    {id:'s8', date:'', results:[{p:'まー',t:-125},{p:'はず',t:-99},{p:'たか',t:224}]},
    {id:'s9a',date:'', results:[{p:'はず',t:62},{p:'まー',t:-71},{p:'はるき',t:-101},{p:'たか',t:110}]},
    {id:'s9b',date:'', results:[{p:'たか',t:3},{p:'まー',t:41},{p:'むつ',t:48},{p:'はず',t:-92}]},
    {id:'s10',date:'', results:[{p:'はず',t:-96},{p:'まー',t:54},{p:'むつ',t:96},{p:'たか',t:-54}]},
    {id:'s11',date:'', results:[{p:'はず',t:9},{p:'まー',t:61},{p:'たか',t:-26},{p:'かえ',t:-44}]},
    {id:'s12',date:'', results:[{p:'たか',t:354},{p:'はず',t:-534},{p:'まー',t:180}]},
    {id:'s13',date:'', results:[{p:'たか',t:-108},{p:'はず',t:104},{p:'まー',t:40},{p:'はるき',t:-36}]},
    {id:'s14',date:'', results:[{p:'はず',t:-88},{p:'たか',t:66},{p:'まー',t:22}]},
    {id:'s15',date:'', results:[{p:'はず',t:-279},{p:'まー',t:137},{p:'たか',t:142}]},
    {id:'s16',date:'', results:[{p:'はず',t:-56},{p:'むつ',t:99},{p:'まー',t:-155},{p:'たか',t:112}]},
    {id:'s17',date:'', results:[{p:'はず',t:78},{p:'まー',t:-2},{p:'たか',t:-76}]},
    {id:'s18',date:'', results:[{p:'まー',t:-91},{p:'はず',t:-134},{p:'たか',t:225}]},
    {id:'s19',date:'', results:[{p:'はず',t:-44},{p:'まー',t:141},{p:'たか',t:185}]},
    {id:'s20',date:'', results:[{p:'はず',t:-56},{p:'まー',t:-7},{p:'たか',t:63}]},
    {id:'s21',date:'', results:[{p:'はず',t:-339},{p:'まー',t:-96},{p:'たか',t:437}]},
    {id:'s22',date:'', results:[{p:'はず',t:-247},{p:'まー',t:174},{p:'たか',t:73}]},
    {id:'s23',date:'', results:[{p:'睦月',t:-78},{p:'たか',t:72},{p:'はず',t:6}]},
    {id:'s24',date:'', results:[{p:'ゆうせい',t:-41},{p:'はず',t:-226},{p:'たか',t:267}]},
  ];
  const sessions = raw.map(s => ({
    id: s.id,
    date: s.date,
    memo: '（既存データ）',
    results: s.results.map(r => ({
      player: r.p, total: r.t, tsumo: 0, ron: 0, furikon: 0
    }))
  }));
  return { players, sessions };
}

let D = loadData();
function save() { localStorage.setItem(KEY, JSON.stringify(D)); }

// ===== NAVIGATION =====
let page = 'home';
let statsPlayer = null;
let addPlayers = [];
let editingId = null;

function go(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('on'));
  document.querySelectorAll('.nv').forEach(x => x.classList.remove('on'));
  document.getElementById('page-' + p).classList.add('on');
  document.querySelector('[data-p="' + p + '"]').classList.add('on');
  page = p;
  const ta = document.getElementById('top-action');
  const tt = document.getElementById('top-title');
  const titles = {home:'🀄 麻雀成績帳',add:'新しい記録',history:'対局履歴',stats:'個人統計',settings:'設定'};
  tt.textContent = titles[p] || '麻雀成績帳';
  ta.style.display = p === 'add' ? 'none' : 'none';
  render(p);
}

function topAction() {}
function render(p) {
  ({home:renderHome, add:renderAdd, history:renderHist, stats:renderStats, settings:renderSettings})[p]?.();
}

// ===== STATS CALC =====
function stats(name) {
  let tot=0,ts=0,ro=0,fu=0,cnt=0;
  D.sessions.forEach(s => {
    const r = s.results.find(x => x.player === name);
    if (r) { tot += +r.total||0; ts += +r.tsumo||0; ro += +r.ron||0; fu += +r.furikon||0; cnt++; }
  });
  const win = ts + ro;
  return {
    tot, ts, ro, fu, cnt,
    avg: cnt ? Math.round(tot/cnt) : 0,
    tsR: win ? Math.round(ts/win*100) : 0,
    roR: win ? Math.round(ro/win*100) : 0,
    fuR: (win+fu) ? Math.round(fu/(win+fu)*100) : 0,
    win
  };
}

function allStats() {
  return D.players.map(n => ({name:n, ...stats(n)})).sort((a,b) => b.tot - a.tot);
}

// ===== UTILS =====
function fmtDate(d) {
  if (!d) return '日付不明';
  const [y,m,dd] = d.split('-');
  return `${y}/${m}/${dd}`;
}
function sc(v) {
  const n = +v||0;
  return `<span class="${n>=0?'pos':'neg'}">${n>=0?'+':''}${n}</span>`;
}
function uid() { return 's' + Date.now() + Math.random().toString(36).slice(2,6); }

// ===== HOME =====
function renderHome() {
  const ct = document.getElementById('home-content');
  const as = allStats();
  const hasSessions = D.sessions.some(s => s.results.some(r => +r.tsumo||+r.ron||+r.furikon));

  const board = as.map((p,i) => `
    <div class="li" onclick="goStats('${p.name}')">
      <div class="li-rank ${i<3?'r'+(i+1):''}">${i+1}</div>
      <div style="flex:1">
        <div class="li-name">${p.name}</div>
        <div class="li-sub">${p.cnt}戦 ${hasSessions ? `• ツモ${p.ts} ロン${p.ro} ふり${p.fu}` : '• ツモ/ロン/ふりこみは新規記録から'}</div>
      </div>
      <div style="text-align:right">
        <div class="li-score ${p.tot>=0?'pos':'neg'}">${p.tot>=0?'+':''}${p.tot}</div>
        <div style="font-size:11px;color:var(--text2)">平均 ${p.avg>=0?'+':''}${p.avg}</div>
      </div>
    </div>`).join('');

  const recent = [...D.sessions].reverse().slice(0,5).map(s => {
    const winner = [...s.results].sort((a,b) => b.total - a.total)[0];
    return `<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px;">
      <span style="color:var(--text2);width:72px;flex-shrink:0">${fmtDate(s.date)}</span>
      <span style="flex:1">${s.results.map(r=>r.player).join(' ・ ')}</span>
      <span style="font-weight:700;color:var(--green)">${winner.player} 勝</span>
    </div>`;
  }).join('');

  ct.innerHTML = `
    <div class="card">
      <div class="card-t">通算順位</div>
      ${as.length ? board : '<div class="empty"><div class="empty-t">データなし</div></div>'}
    </div>
    <div class="card">
      <div class="card-t">最近の対局</div>
      ${recent || '<p style="color:var(--text2);font-size:13px">まだ記録がありません</p>'}
    </div>
  `;
}

function goStats(name) {
  statsPlayer = name;
  go('stats');
}

// ===== ADD =====
function renderAdd() {
  const ct = document.getElementById('add-content');
  addPlayers = [];
  ct.innerHTML = `
    <div class="card">
      <div class="fg">
        <label class="fl">対局日</label>
        <input class="fi" type="date" id="f-date" value="${TODAY}">
      </div>
      <div class="fg">
        <label class="fl">メモ（任意）</label>
        <input class="fi" type="text" id="f-memo" placeholder="例：渋谷例会" maxlength="30">
      </div>
    </div>

    <div id="player-entries"></div>

    <button class="add-p-btn" onclick="openSheet()">
      <span style="font-size:22px">＋</span> プレイヤーを追加
    </button>

    <div style="height:16px"></div>
    <button class="pri-btn" onclick="saveSession()">💾 保存する</button>
  `;
}

function openSheet() {
  const chips = document.getElementById('sheet-chips');
  chips.innerHTML = D.players.map(p => `
    <button class="chip ${addPlayers.includes(p)?'on':''}" onclick="toggleChip(this,'${p}')">${p}</button>
  `).join('');
  document.getElementById('player-sheet').classList.add('open');
  document.getElementById('new-p-in').value = '';
}

function toggleChip(el, name) {
  if (addPlayers.includes(name)) {
    addPlayers = addPlayers.filter(x => x !== name);
    el.classList.remove('on');
  } else {
    addPlayers.push(name);
    el.classList.add('on');
  }
}

function addNewPlayer() {
  const v = document.getElementById('new-p-in').value.trim();
  if (!v) return;
  if (!D.players.includes(v)) { D.players.push(v); save(); }
  if (!addPlayers.includes(v)) {
    addPlayers.push(v);
    const chips = document.getElementById('sheet-chips');
    const btn = document.createElement('button');
    btn.className = 'chip on';
    btn.textContent = v;
    btn.onclick = function(){ toggleChip(this, v); };
    chips.appendChild(btn);
  }
  document.getElementById('new-p-in').value = '';
}

function confirmPlayers() {
  document.getElementById('player-sheet').classList.remove('open');
  const ct = document.getElementById('player-entries');
  ct.innerHTML = addPlayers.map(p => `
    <div class="pe" id="pe-${p}">
      <div class="pe-hd">
        <div class="pe-nm">${p}</div>
        <button class="pe-rm" onclick="removeEntry('${p}')">×</button>
      </div>
      <div class="eg">
        <div class="ef">
          <label>合計点</label>
          <input type="number" id="t-${p}" placeholder="0" inputmode="numeric">
        </div>
        <div class="ef">
          <label>🀄 ツモ</label>
          <input type="number" id="ts-${p}" placeholder="0" min="0" inputmode="numeric" value="0">
        </div>
        <div class="ef">
          <label>🎯 ロン</label>
          <input type="number" id="ro-${p}" placeholder="0" min="0" inputmode="numeric" value="0">
        </div>
        <div class="ef">
          <label>💸 ふり</label>
          <input type="number" id="fu-${p}" placeholder="0" min="0" inputmode="numeric" value="0">
        </div>
      </div>
    </div>
  `).join('');
}

function removeEntry(p) {
  addPlayers = addPlayers.filter(x => x !== p);
  document.getElementById('pe-' + p)?.remove();
}

function saveSession() {
  if (addPlayers.length === 0) { alert('プレイヤーを追加してください'); return; }
  const date = document.getElementById('f-date').value;
  const memo = document.getElementById('f-memo').value.trim();
  const results = addPlayers.map(p => ({
    player: p,
    total: parseInt(document.getElementById('t-'+p)?.value)||0,
    tsumo: parseInt(document.getElementById('ts-'+p)?.value)||0,
    ron:   parseInt(document.getElementById('ro-'+p)?.value)||0,
    furikon: parseInt(document.getElementById('fu-'+p)?.value)||0,
  }));
  D.sessions.push({ id: uid(), date, memo, results });
  save();
  alert('保存しました！');
  go('home');
}

// ===== HISTORY =====
function renderHist() {
  const ct = document.getElementById('hist-content');
  if (!D.sessions.length) {
    ct.innerHTML = `<div class="empty"><div class="empty-ico">📋</div><div class="empty-t">記録がありません</div></div>`;
    return;
  }
  const sess = [...D.sessions].reverse();
  ct.innerHTML = sess.map(s => {
    const rows = s.results.map(r => `
      <div class="si-row">
        <span class="si-nm">${r.player}</span>
        <span class="si-sc ${(+r.total||0)>=0?'pos':'neg'}">${(+r.total||0)>=0?'+':''}${r.total||0}</span>
        <span class="si-dt">ツモ${r.tsumo||0} ロン${r.ron||0} ふり${r.furikon||0}</span>
      </div>`).join('');
    const memo = s.memo ? `<span style="font-size:11px;color:var(--text2);margin-left:8px">${s.memo}</span>` : '';
    return `
      <div class="si">
        <div class="si-hd" onclick="toggleSess('${s.id}')">
          <div>
            <div class="si-date">${fmtDate(s.date)}${memo}</div>
          </div>
          <span class="si-meta">${s.results.length}人</span>
          <span class="si-ch" id="ch-${s.id}">›</span>
        </div>
        <div class="si-bd" id="bd-${s.id}">
          ${rows}
          <button class="del-btn" onclick="delSession('${s.id}')">🗑 この記録を削除</button>
        </div>
      </div>`;
  }).join('');
}

function toggleSess(id) {
  document.getElementById('bd-'+id)?.classList.toggle('open');
  const ch = document.getElementById('ch-'+id);
  if (ch) ch.classList.toggle('open');
}

function delSession(id) {
  if (!confirm('この記録を削除しますか？')) return;
  D.sessions = D.sessions.filter(s => s.id !== id);
  save();
  renderHist();
}

// ===== STATS =====
function renderStats() {
  const ct = document.getElementById('stats-content');
  if (!D.players.length) {
    ct.innerHTML = `<div class="empty"><div class="empty-ico">📊</div><div class="empty-t">プレイヤーがいません</div></div>`;
    return;
  }
  if (!statsPlayer || !D.players.includes(statsPlayer)) statsPlayer = D.players[0];

  const tabs = D.players.map(p =>
    `<button class="ptab ${p===statsPlayer?'on':''}" onclick="selSP('${p}')">${p}</button>`
  ).join('');

  const s = stats(statsPlayer);
  const sC = s.tot>=0?'var(--green)':'var(--red)';
  const sSign = s.tot>=0?'+':'';

  const recent = [...D.sessions]
    .filter(x => x.results.some(r => r.player===statsPlayer))
    .sort((a,b) => (b.date||'').localeCompare(a.date||''))
    .slice(0,10)
    .map(x => {
      const r = x.results.find(r => r.player===statsPlayer);
      const t = +r.total||0;
      return `<div style="display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px">
        <span style="color:var(--text2);width:72px;flex-shrink:0">${fmtDate(x.date)}</span>
        <span class="${t>=0?'pos':'neg'}" style="width:60px;text-align:right;font-weight:800;font-variant-numeric:tabular-nums;flex-shrink:0">${t>=0?'+':''}${t}</span>
        <span style="color:var(--text2);flex:1;text-align:right">ツモ${r.tsumo||0} ロン${r.ron||0} ふり${r.furikon||0}</span>
      </div>`;
    }).join('');

  const hasWinData = s.win > 0;
  const hasFuData = s.fu > 0 || s.win > 0;

  ct.innerHTML = `
    <div class="ptabs">${tabs}</div>

    <div class="card" style="margin-top:10px">
      <div style="text-align:center;padding:4px 0 12px">
        <div style="font-size:12px;color:var(--text2);margin-bottom:2px">通算スコア</div>
        <div style="font-size:38px;font-weight:900;color:${sC};font-variant-numeric:tabular-nums">${sSign}${s.tot}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:2px">${s.cnt}戦 ・ 平均 ${s.avg>=0?'+':''}${s.avg}</div>
      </div>
      <div class="msg">
        <div class="ms"><div class="ms-v" style="color:var(--blue)">${s.ts}</div><div class="ms-l">ツモ回数</div></div>
        <div class="ms"><div class="ms-v" style="color:var(--amber)">${s.ro}</div><div class="ms-l">ロン回数</div></div>
        <div class="ms"><div class="ms-v" style="color:var(--red)">${s.fu}</div><div class="ms-l">ふりこみ</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">和了の内訳 & ふりこみ率</div>

      ${hasWinData ? `
      <div class="bar-row">
        <div class="bar-hd"><span style="color:var(--blue)">🀄 ツモ和了</span><span style="font-weight:700">${s.ts}回（${s.tsR}%）</span></div>
        <div class="bar-bg"><div class="bar-fill bt" style="width:${s.tsR}%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-hd"><span style="color:var(--amber)">🎯 ロン和了</span><span style="font-weight:700">${s.ro}回（${s.roR}%）</span></div>
        <div class="bar-bg"><div class="bar-fill ba" style="width:${s.roR}%"></div></div>
      </div>
      ` : '<p style="font-size:13px;color:var(--text2);margin-bottom:10px">ツモ・ロンのデータはまだありません</p>'}

      ${hasFuData ? `
      <div class="bar-row" style="margin-bottom:0">
        <div class="bar-hd"><span style="color:var(--red)">💸 ふりこみ率</span><span style="font-weight:700">${s.fu}回（${s.fuR}%）</span></div>
        <div class="bar-bg"><div class="bar-fill br" style="width:${s.fuR}%"></div></div>
      </div>
      <p style="font-size:11px;color:var(--text2);margin-top:6px">※ ふりこみ率 = ふりこみ ÷（和了 + ふりこみ）× 100</p>
      ` : ''}
    </div>

    ${recent ? `
    <div class="card">
      <div class="card-t">最近の成績（最新10件）</div>
      ${recent}
    </div>` : ''}
  `;
}

function selSP(name) { statsPlayer = name; renderStats(); }

// ===== SETTINGS =====
function renderSettings() {
  const ct = document.getElementById('set-content');
  const plist = D.players.map(p => `
    <div class="pm-row">
      <span class="pm-nm">${p}</span>
      <button class="danger-btn" onclick="delPlayer('${p}')">削除</button>
    </div>`).join('');

  ct.innerHTML = `
    <div class="card">
      <div class="set-t">プレイヤー管理</div>
      ${plist}
      <div class="new-p-row" style="margin-top:12px">
        <input class="new-p-in" id="set-new-p" placeholder="プレイヤー名を追加" maxlength="8">
        <button class="new-p-add" onclick="settingAddPlayer()">追加</button>
      </div>
    </div>

    <div class="card">
      <div class="set-t">データ管理</div>
      <button class="sec-btn" onclick="exportCSV()">📥 CSVで書き出す</button>
      <button class="sec-btn" style="border-color:#fca5a5;color:var(--red)" onclick="resetAll()">⚠️ 全データをリセット</button>
    </div>

    <div class="card" style="font-size:12px;color:var(--text2);line-height:1.8">
      <div class="set-t">使い方</div>
      <p>🎯 「記録」タブから対局結果を入力</p>
      <p>📊 「統計」タブで個人の成績・ツモ率・ふりこみ率を確認</p>
      <p>📋 「履歴」タブで過去の対局を管理</p>
      <p style="margin-top:8px;color:var(--text2)">💡 既存の記録はスコアのみです。今後の記録からツモ・ロン・ふりこみを入力できます。</p>
    </div>
  `;
}

function settingAddPlayer() {
  const v = document.getElementById('set-new-p').value.trim();
  if (!v) return;
  if (!D.players.includes(v)) { D.players.push(v); save(); renderSettings(); }
}

function delPlayer(name) {
  if (!confirm(`「${name}」を削除しますか？\n※ 対局履歴のデータは残ります`)) return;
  D.players = D.players.filter(p => p !== name);
  save();
  renderSettings();
}

function exportCSV() {
  const rows = [['日付','メモ','プレイヤー','合計点','ツモ','ロン','ふりこみ']];
  D.sessions.forEach(s => {
    s.results.forEach(r => {
      rows.push([s.date||'',s.memo||'',r.player,r.total||0,r.tsumo||0,r.ron||0,r.furikon||0]);
    });
  });
  const csv = rows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '麻雀成績.csv'; a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  if (!confirm('全てのデータを削除しますか？\nこの操作は元に戻せません')) return;
  if (!confirm('本当に全データを削除しますか？')) return;
  localStorage.removeItem(KEY);
  D = initData();
  save();
  go('home');
}

// Close sheet when clicking overlay
document.getElementById('player-sheet').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// Init
renderHome();
</script>
</body>
</html>
